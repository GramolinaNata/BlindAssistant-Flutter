name: blindddd
description: Приложение для помощи слабовидящим с AI улучшением

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  camera: ^0.10.5
  audioplayers: ^5.2.1
  permission_handler: ^11.0.1
  flutter_tts: ^3.8.3
  path_provider: ^2.1.1
  flutter_sound: ^9.2.13
  speech_to_text: ^7.3.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env